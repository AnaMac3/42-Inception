# ==================================================================
# PHP-FPM pool configuration for WordPress container
#
# This file configures the PHP-FPM process manager to run PHP
# scripts for the WordPress application. It defines:
#   - The user and group under which PHP processes run
#   - The listening port for incoming FastCGI requests
#   - The preocess management method and limits
#   - Environment handling
#
# Each container has its own PHP-FPM pool; this configuration 
# ensures that PHP runs with correct permissions and in a controlled
# environment
# ==================================================================
[www]

# User and group
user = www-data
group = www-data

# Listening configuration
listen = 9000

# Process management
# PHP-FPM uses a dynamic process manager, creating child processes
# as needed, up to defined limits. This allows efficient use of 
# resources without overloading the container
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

# Environment: do not clear env variables
clear_env = no
