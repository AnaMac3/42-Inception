# ==================================================================
# MairaDB server configuration override
# 
# This configuration file overrides default MariaDB settings in order
# to allow network access from other Docker containers.
# By default, MariaDB binds to 127.0.0.1 (localhost), which would 
# prevent external connections.
# Binding to 0.0.0.0 allows MariaDB to accept connections from
# the Docker bridge network while remaining isolated from the host.
# ==================================================================
[mysqld]
# Listen on all network interfaces inside the container
bind-address = 0.0.0.0
# Default MariaDB port
port = 3306
