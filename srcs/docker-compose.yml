services:
  nginx:
    build: ./requeriments/nginx
    container_name: nginx
    env_file:
      - .env
    ports:
      - "443:443"
    volumes:
      - /home/amacarul/data/wordpress:/var/www/html
    depends_on:
      - wordpress
    networks: 
      - inceptionnet
    restart: always

  wordpress:
    build: ./requeriments/wordpress
    container_name: wordpress
    env_file:
      - .env
    volumes:
      - /home/amacarul/data/wordpress:/var/www/html
    depends_on:
      - mariadb
    networks:
      - inceptionnet
    restart: always

  mariadb:
    build: ./requeriments/mariadb
    container_name: mariadb
    env_file:
      - .env
    volumes:
      - /home/amacarul/data/mariadb:/var/lib/mysql
    networks:
      - inceptionnet
    restart: always

networks:
  inceptionnet:
    driver: bridge
